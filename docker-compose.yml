version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mss-wardrobe-fe
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://api-gateway:8080/api/v1
    restart: always
    networks:
      - smart-wardrobe-network

networks:
  smart-wardrobe-network:
    driver: bridge
